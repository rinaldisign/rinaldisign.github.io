<div id="fireflies"></div>

<script>
const fireflyCount = 60; // jumlah kunang-kunang
const firefliesContainer = document.getElementById('fireflies');

for (let i = 0; i < fireflyCount; i++) {
  const f = document.createElement('div');
  f.classList.add('firefly');

  // ukuran acak 2px - 6px
  const size = 2 + Math.random() * 4;
  f.style.width = size + 'px';
  f.style.height = size + 'px';

  resetFirefly(f);
  firefliesContainer.appendChild(f);
  animateFirefly(f);
}

function resetFirefly(f) {
  f.style.left = Math.random() * window.innerWidth + 'px';
  f.style.top = Math.random() * window.innerHeight + 'px';
  f.style.opacity = 0.3 + Math.random() * 0.7;
  f.speedX = (Math.random() - 0.5) * 0.7;
  f.speedY = (Math.random() - 0.5) * 0.7;
  f.scale = 0.5 + Math.random() * 0.5; // variasi skala
}

function animateFirefly(f) {
  function move() {
    let x = parseFloat(f.style.left);
    let y = parseFloat(f.style.top);

    x += f.speedX;
    y += f.speedY;

    // reset posisi jika keluar layar
    if (x < 0 || x > window.innerWidth || y < 0 || y > window.innerHeight) {
      resetFirefly(f);
      x = parseFloat(f.style.left);
      y = parseFloat(f.style.top);
    }

    f.style.left = x + 'px';
    f.style.top = y + 'px';

    // efek berkedip alami
    const opacity = 0.3 + Math.random() * 0.7;
    f.style.opacity = opacity;

    // efek variasi skala
    f.style.transform = `scale(${f.scale})`;

    requestAnimationFrame(move);
  }
  move();
}
</script>

<script>
  // hanya tampil sekali per session
  if (!sessionStorage.getItem("openingShown")) {

    window.addEventListener("load", function() {
      setTimeout(function() {
        const opening = document.getElementById("opening");
        opening.style.opacity = "0";

        setTimeout(() => {
          opening.style.display = "none";
        }, 1000);

      }, 2000); // durasi tampil
    });

    sessionStorage.setItem("openingShown", "true");

  } else {
    // langsung skip opening
    document.addEventListener("DOMContentLoaded", function() {
      const opening = document.getElementById("opening");
      if (opening) opening.style.display = "none";
    });
  }
</script>
